seed: 42

experiment:
  active_instruments: [drum, guitar, vocal]
  conditions: [multi_attention, passive_x3]
  seed: 42
  num_folds: 10
  fold_index: 0

data:
  # Default fallback source (used when condition_sources missing keys)
  mat_path: data/EEG/song21_Imputed.mat
  audio_path: data/songs/song21_16k.wav
  data_key: data21

  # Condition-specific EEG sources; replace with your own files/keys.
  condition_sources:
    passive:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    drum:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    guitar:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    vocal:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21

  eeg_time: 437
  audio_samples: 56000
  chunk_sec: 3.5
  eeg_fs: 125
  audio_fs: 16000
  batch_size: 4
  num_workers: 0
  text_prompt: "Pop music"
  eeg_preprocessing:
    per_channel_normalization: true
    band_pass: false
    ica: false
    representation: raw_time_series

model:
  use_subject_adapter: true
  subject_emb_dim: 64
  projector:
    channels: [256, 512, 1024, 2048]
    strides: [5, 2, 2, 2]
    lat_grid: null
    use_linear_fallback: true
  unet:
    cache_pipeline: true
    text_cache_path: data/precomputed/audioldm2_text_pop_music.pt

audio_encoder:
  model_id: cvssp/audioldm2-music
  sample_rate: 16000
  freeze_vae: true
  use_mode: false

controlnet:
  enabled: true
  control_scale: 1.0
  freeze_base_unet: true
  copy_encoder_weights: true
  inject_middle_block: true
  zero_init: true
  trainable_modules:
    - subject_adapter
    - projector
    - control_branch

latent_cache:
  enabled: true
  path: data/precomputed/song21_audioldm2_latents.pt
  latent_channels: 8
  precompute_batch_size: 16
  precompute_use_mode: true

diffusion:
  num_train_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02

split:
  loso:
    enabled: true
  val_ratio: 0.1

train:
  device: cuda
  lr: 0.0001
  epochs: 1
  grad_clip: 1.0
  log_every: 10
  validation_metric: clap
  validation_num_inference_steps: 5
  validation_generate_batches: 1
  best_checkpoint_name: best_model.pt
  run_mode: single_fold
  output_root: outputs/loso_runs
  checkpoint_name: model.pt
