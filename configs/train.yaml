seed: 42

experiment:
  active_instruments: [drum, guitar, vocal]
  conditions: [multi_attention, passive_x3]
  seed: 42
  num_folds: 10
  fold_index: 0

data:
  # Default fallback source (used when condition_sources missing keys)
  mat_path: data/EEG/song21_Imputed.mat
  audio_path: data/songs/song21_16k.wav
  data_key: data21

  # Condition-specific EEG sources; replace with your own files/keys.
  condition_sources:
    passive:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    drum:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    guitar:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21
    vocal:
      mat_path: data/EEG/song21_Imputed.mat
      data_key: data21

  eeg_time: 437
  audio_samples: 56000
  chunk_sec: 3.5
  eeg_fs: 125
  audio_fs: 16000
  batch_size: 4
  num_workers: 0
  text_prompt: "Pop music"
  eeg_preprocessing:
    per_channel_normalization: true
    band_pass: false
    ica: false
    representation: raw_time_series

model:
  use_subject_adapter: true
  subject_emb_dim: 64
  unet_base_channels: 128
  prefer_audioldm_unet: true
  projector:
    channels: [256, 512, 1024, 2048]
    strides: [5, 2, 2, 2]
    lat_grid: null
    use_linear_fallback: true
  audioldm_unet_kwargs:
    image_size: 16
    in_channels: 8
    model_channels: 64
    out_channels: 8
    num_res_blocks: 2
    attention_resolutions: [1, 2, 4]
    dropout: 0.0
    channel_mult: [1, 2, 4]
    conv_resample: true
    dims: 2
    extra_sa_layer: false
    extra_film_condition_dim: null
    use_checkpoint: false
    use_fp16: false
    num_heads: 4
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: false
    resblock_updown: false
    use_new_attention_order: false
    use_spatial_transformer: false
    transformer_depth: 1
    context_dim: null
    n_embed: null
    legacy: true

audio_encoder:
  model_id: cvssp/audioldm2-music
  sample_rate: 16000
  freeze_vae: true
  use_mode: false

controlnet:
  enabled: true
  control_scale: 1.0
  freeze_base_unet: true
  copy_encoder_weights: true
  inject_middle_block: true
  zero_init: true
  trainable_modules:
    - subject_adapter
    - projector
    - control_branch

latent_cache:
  enabled: true
  path: data/precomputed/song21_audioldm2_latents.pt
  latent_channels: 8
  precompute_batch_size: 16
  precompute_use_mode: true

diffusion:
  num_train_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02

split:
  loso:
    enabled: true
  val_ratio: 0.1

train:
  device: cuda
  lr: 0.0001
  epochs: 1
  grad_clip: 1.0
  log_every: 10
  run_mode: single_fold
  output_root: outputs/loso_runs
  checkpoint_name: model.pt
